<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="icon" type="image/x-icon" href="image/Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #0f172a;
            background-color: #f8fafc;
        }
        
        .navbar {
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 70px;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            justify-self: start;
        }

        .nav-logo img {
            height: 35px;
            width: auto;
        }

        .nav-logo span {
            font-weight: 700;
            font-size: 18px;
            color: #0f172a;
            white-space: nowrap;
        }

        .nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 35px;
            grid-column: 2;
        }

        .nav-links a {
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            font-size: 15px;
            position: relative;
            padding-bottom: 4px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #059669;
            transform-origin: bottom center;
            transition: transform 0.25s ease-out;
        }

        .nav-links a:hover {
            color: #059669;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
        }
        
        .hero-section {
            background: linear-gradient(135deg, #f0fdf4 0%, #e2e8f0 100%);
            padding: 60px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .content-box {
            background-color: #ffffff;
            max-width: 480px;
            width: 100%;
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        
        .contact-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .contact-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin: 0 0 8px 0;
        }

        .contact-header p {
            color: #475569;
            font-size: 15px;
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: #475569;
        }
        
        .form-group input, 
        .form-group textarea {
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #ffffff;
            font-size: 15px;
        }
        
        .form-group input:focus, 
        .form-group textarea:focus {
            outline: 2px solid #059669;
        }
        
        .submit-btn {
            background-color: #059669;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }
        
        .submit-btn:hover {
            background-color: #047857;
        }

        #form-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }
        #form-status.success {
            background-color: #dcfce7;
            color: #166534;
            display: block;
        }
        #form-status.error {
            background-color: #fee2e2;
            color: #991b1b;
            display: block;
        }
        
        footer { 
            background: #ffffff; 
            padding: 30px 20px; 
            text-align: center; 
            border-top: 1px solid #e2e8f0; 
            color: #475569;
            font-size: 14px;
        }

        footer p { margin: 5px 0; }
        
        @media (max-width: 768px) {
            .navbar {
                display: flex;
                flex-direction: column;
                height: auto;
                padding: 15px 20px;
                gap: 15px;
            }
            .nav-logo {
                justify-self: center;
            }
            .content-box {
                padding: 30px 20px;
            }
            .nav-links {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
 
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="image/Favicon.png" alt="Smart Transportation Logo">
            <span>Smart Transportation</span>
        </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="ev.html">EVs</a></li>
        <li><a href="aboutus.html">About Us</a></li>
        <li><a href="benefits.html">Benefits</a></li>
        <li><a href="contactus.html">Contact Us</a></li>
    </ul>
    </nav>
 
    <main class="hero-section">
        <div class="content-box">
            <div class="contact-header">
                <h2>Feel free to ask!</h2>
                <p>Have questions about our Smart Transportation fleet or booking services? Drop us a line.</p>
            </div>

            <form id="my-form" class="contact-form" action="https://formspree.io/f/mlgvdwow" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Tell us how we can help..." required></textarea>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">Send Message</button>
                
                <div id="form-status"></div>
            </form>
        </div>
    </main>
 
    <footer>
        <p>© 2026 Group 4 Smart Transportation. All rights reserved.</p>
        <p>Driving towards a zero-emission future.</p>
    </footer>

    <script>
        const form = document.getElementById("my-form");
        const status = document.getElementById("form-status");
        const button = document.getElementById("submit-btn");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            
            button.disabled = true;
            button.innerText = "Sending...";
            status.className = ""; 
            status.style.display = "none";

            const data = new FormData(event.target);

            try {
                const response = await fetch(event.target.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    status.innerHTML = "Thank you! Your message has been sent.";
                    status.className = "success";
                    form.reset();
                } else {
                    const responseData = await response.json();
                    if (responseData.hasOwnProperty('errors')) {
                        status.innerHTML = responseData['errors'].map(error => error['message']).join(", ");
                    } else {
                        status.innerHTML = "Oops! There was a problem submitting your form.";
                    }
                    status.className = "error";
                }
            } catch (error) {
                status.innerHTML = "Oops! There was a problem connecting to the server.";
                status.className = "error";
            } finally {
                button.disabled = false;
                button.innerText = "Send Message";
            }
        });
    </script>
</body>
</html>
