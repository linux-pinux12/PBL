<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Ride</title>
    <link rel="icon" type="image/x-icon" href="image/Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #0f172a;
            background-color: #f8fafc;
        }
        
        .navbar {
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 70px;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            justify-self: start;
        }

        .nav-logo img {
            height: 35px;
            width: auto;
        }

        .nav-logo span {
            font-weight: 700;
            font-size: 18px;
            color: #0f172a;
            white-space: nowrap;
        }

        .nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 35px;
            grid-column: 2;
        }

        .nav-links a {
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            font-size: 15px;
            position: relative;
            padding-bottom: 4px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #059669;
            transform-origin: bottom center;
            transition: transform 0.25s ease-out;
        }

        .nav-links a:hover {
            color: #059669;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
        }
        
        .hero-section {
            background: linear-gradient(135deg, #f0fdf4 0%, #e2e8f0 100%);
            padding: 60px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .content-box {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-header h2 {
            font-size: 28px;
            color: #0f172a;
            margin: 0 0 5px 0;
        }

        .form-header p {
            color: #475569;
            font-size: 15px;
            margin: 0;
        }
        
        .booking-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
        }
        
        .form-group input, 
        .form-group select {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background-color: #ffffff;
            box-sizing: border-box;
            width: 100%;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: 2px solid #059669;
        }
        
        .confirm-btn {
            background-color: #059669;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        
        .confirm-btn:hover {
            background-color: #047857;
        }
        
        footer { 
            background: #ffffff; 
            padding: 30px 20px; 
            text-align: center; 
            border-top: 1px solid #e2e8f0; 
            color: #475569;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .navbar {
                display: flex;
                flex-direction: column;
                height: auto;
                padding: 15px 20px;
                gap: 15px;
            }
            .nav-logo {
                justify-self: center;
            }
            .nav-links {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
 
    <nav class="navbar">
        <a href="homepage.html" class="nav-logo">
            <img src="image/Favicon.png" alt="Smart Transportation Logo">
            <span>Smart Transportation</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="ev.html">EVs</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="benefits.html">Benefits</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
        </ul>
    </nav>
 
    <main class="hero-section">
        <div class="content-box">
            <div class="form-header">
                <h2>Confirm Booking</h2>
                <p>Secure your zero-emission eco ride instantly.</p>
            </div>

            <form class="booking-form" id="booking-form" action="#" method="POST">
                <div class="form-group">
                    <label for="rider-name">Your Full Name</label>
                    <input type="text" id="rider-name" name="rider_name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="pickup">Pickup Location</label>
                    <input type="text" id="pickup" name="pickup_location" placeholder="Enter street or building address" required>
                </div>

                <div class="form-group">
                    <label for="payment-method">Payment Method</label>
                    <select id="payment-method" name="payment_method" required>
                        <option value="">-- Choose Option --</option>
                        <option value="cash">Cash to Driver</option>
                        <option value="credit">Credit Card/Debit Card</option>
                        <option value="mobile_pay">Mobile Pay</option>
                    </select>
                </div>

                <button type="submit" class="confirm-btn">Complete Reservation</button>
            </form>
        </div>
    </main>
 
    <footer>
        <p>© 2026 Group 4 Smart Transportations. All rights reserved.</p>
    </footer>
</body>
</html>
